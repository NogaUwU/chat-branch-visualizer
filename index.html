<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Branch Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e4ef;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin: 0 auto 24px;
      display: block;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #8b8fa8;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity .15s;
    }
    a:hover { opacity: .8; }
    .btn-primary {
      background: #6c8ef7;
      color: #fff;
    }
    .btn-ghost {
      background: rgba(255,255,255,.07);
      color: #c8d0f0;
      border: 1px solid rgba(255,255,255,.1);
    }
    .footnote {
      margin-top: 40px;
      font-size: 12px;
      color: #4a4d65;
    }
    .footnote a { color: #6c8ef7; font-size: 12px; padding: 0; background: none; border: none; }
  </style>
</head>
<body>
<div class="card">
  <img class="icon" src="icons/icon128.png" alt="Chat Branch Visualizer icon">
  <h1>Chat Branch Visualizer</h1>
  <p>Visualize your ChatGPT and Claude conversation branches as an interactive tree — right in Chrome's native side panel.</p>
  <div class="links">
    <a class="btn-primary" href="https://chromewebstore.google.com/detail/chat-branch-visualizer/mahknjdihdpeceompocgcclnmjikmncb" target="_blank" rel="noopener">
      Add to Chrome
    </a>
    <a class="btn-ghost" href="https://github.com/NogaUwU/chat-branch-visualizer" target="_blank" rel="noopener">
      GitHub
    </a>
  </div>
  <p class="footnote">
    <a href="/privacy">Privacy Policy</a>
  </p>
</div>
</body>
</html>
